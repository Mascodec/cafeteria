{% extends 'base.html' %}

{% block content %}
{% block body_class %}cafeteria-bg{% endblock %}
<div class="card auth-card">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Login</button>
    </form>
    <p class="small-text">Need an account? <a href="{% url 'register' %}">Register here</a>.</p>
</div>
{% endblock %}
